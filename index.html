<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&S Upstate Solutions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVIGATION BAR -->
<header id="site-header" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 1.25rem 0;
  z-index: 50;
  transition: background 0.3s ease, border-bottom 0.3s ease;
  background: transparent;
  border-bottom: 1px solid transparent;
">
  <div class="container" style="display: flex; justify-content: space-between; align-items: center;">

    <!-- Logo / Brand -->
    <div style="font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 0.1em;">
      <a href="/" style="color: hsl(var(--foreground)); text-decoration: none;">
        D&S UPSTATE
      </a>
    </div>

    <!-- Desktop Nav -->
    <nav class="desktop-nav" style="display: flex; gap: 2rem;">
      <a href="/" style="color: hsl(var(--foreground)); text-decoration: none; font-family: var(--font-body);">Home</a>
      <a href="/pallet-services" style="color: hsl(var(--foreground)); text-decoration: none; font-family: var(--font-body);">Services</a>
      <a href="/reclaimiq" style="color: hsl(var(--foreground)); text-decoration: none; font-family: var(--font-body);">ReclaimIQ</a>
      <a href="/contact" style="color: hsl(var(--foreground)); text-decoration: none; font-family: var(--font-body);">Contact</a>
    </nav>

  </div>
</header>

  <!-- HERO SECTION -->
  <section class="hero" style="position: relative; min-height: 100vh; display: flex; align-items: center;">

    <!-- Background Image -->
    <img 
      src="https://media.base44.com/images/public/6a2c5aabd7da46b2db1a3d7a/89b43dc96_generated_0d5d4765.png"
      alt="Industrial pallet warehouse"
      style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.30;"
    />

    <!-- Overlay -->
    <div class="hero-overlay"></div>

    <!-- Hero Content -->
    <div class="container" style="position: relative; z-index: 10; padding-top: 6rem; padding-bottom: 6rem;">
      <div style="max-width: 700px;">

        <span class="mono" style="font-size: 12px; color: hsl(var(--primary));">
          D&S UPSTATE SOLUTIONS
        </span>

        <h1 style="font-size: 4rem; line-height: 1.05; margin-top: 1rem;">
          Engineered<br />
          Pallet<br />
          <span style="color: hsl(var(--primary));">Solutions.</span>
        </h1>

        <p style="font-size: 1.25rem; margin-top: 1.5rem; max-width: 500px;">
          Built for strength, safety, and reliability. Pallets are our core business — engineering makes them better.
        </p>

        <!-- Buttons -->
        <div style="margin-top: 2.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
          <a href="/pallet-services" class="btn-primary">OUR SERVICES</a>
          <a href="/contact" class="btn-outline">GET A QUOTE</a>
        </div>

      </div>
    </div>

    <!-- Scroll Indicator -->
    <div style="
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 60px;
      background: linear-gradient(to bottom, hsl(var(--primary)), transparent);
      opacity: 0.8;
    "></div>

  </section>
<script>
  const header = document.getElementById('site-header');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      header.style.background = "hsl(var(--background))";
      header.style.borderBottom = "1px solid hsl(var(--border))";
    } else {
      header.style.background = "transparent";
      header.style.borderBottom = "1px solid transparent";
    }
  });
</script>

</body>
</html>
